<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate CSS Cheat Sheet</title>
    
    <link rel="stylesheet" href="1.css">

    <style>
        /* This will beat a generic `body` rule in style.css purely based on load order */
        body {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <header id="main-header" class="site-header dark-theme">
        <nav class="nav-container">
            <ul class="nav-list">
                <li class="nav-item"><a href="#" class="nav-link active">Home</a></li>
                <li class="nav-item"><a href="#" class="nav-link">About</a></li>
                <li class="nav-item"><a href="#" class="nav-link special-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="content-wrapper">
        <h1 class="page-title">User Settings</h1>
        <p class="subtitle">Update your information below.</p>
        <p class="description">Please ensure all data is correct.</p>

        <div class="form-container" id="profile-section">
            <form id="user-profile-form" class="form-layout">
                
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control required-field">
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" disabled>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="newsletter" class="toggle-box" checked>
                    <label for="newsletter">Subscribe to newsletter</label>
                </div>

                <button type="submit" id="save-btn" class="btn btn-primary" style="background-color: #ff5722; color: white;">
                    Save Changes
                </button>

            </form>
        </div>
    </main>

</body>
</html>
