<!-- 
=====================================================================
PHASE 5: FORMS & INTERACTIVITY
=====================================================================

HIGH-LEVEL SUMMARY:

This phase focuses on HTML Forms and Native Interactive Elements.

Core Concepts Covered:

1. Form Architecture
   - <form> structure
   - action & method (GET vs POST)
   - target, autocomplete
   - name attribute (critical for backend data)

2. Form Grouping & Semantics
   - <fieldset> and <legend>
   - Proper <label> association using "for" + "id"

3. Input Types
   - text, email, password : basic text inputs
   - number (min, max, step) : numeric input with validation
   - date : calendar picker
   - checkbox : multiple selections
   - radio : single selection within a group
   - file : file uploads
   - submit : form submission
   - list attribute with <datalist> : autocomplete suggestions

4. Form Controls
   - <textarea>
   - <select> and <option>
   - <datalist>

5. Native Interactive Widgets (No JavaScript required)
   - <details> & <summary>
   - <progress>
   - <meter>
   - <dialog>

This document acts as a long-term reference guide for:
- Input validation
- Browser-native UI behavior
- Form submission mechanics
- Accessibility best practices
=====================================================================
-->

<!-- 
<!DOCTYPE html>

Explanation:
Defines the document type and HTML version. Required at the very top.

Use Case:
Ensures the browser renders the page in standards mode.

Value:
Always: <!DOCTYPE html>
-->
<!DOCTYPE html>

<!-- 
<html>

Explanation:
Root element of the HTML document.

Key Attributes:
- lang → Specifies document language (important for accessibility and SEO).
  Example: lang="en", lang="ar", lang="fr"
- dir → Text direction (ltr / rtl)

Use Case:
Always wraps entire HTML page.
-->
<html lang="en">

<head>
  <!-- 
  <meta charset="UTF-8">

  Explanation:
  Defines character encoding.

  Why UTF-8?
  Supports nearly all characters worldwide.

  Important Attributes:
  - charset → character encoding type
  -->
  <meta charset="UTF-8">

  <!-- 
  <meta name="viewport">

  Explanation:
  Controls layout on mobile devices.

  Attributes:
  - width=device-width
  - initial-scale=1.0

  Use Case:
  Essential for responsive design.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 
  <title>

  Explanation:
  Sets the page title shown in browser tab.
  -->
  <title>Phase 5: Forms & Interactivity</title>

  <!-- 
  <style>

  Explanation:
  Internal CSS styling.

  Alternative Approaches:
  - External CSS: <link rel="stylesheet" href="styles.css">
  - Inline style: style="color:red"

  Use Case:
  Styling for demonstration purposes.
  -->
  <style>
    body { font-family: system-ui, sans-serif; color: #222; background: #fafafa; padding: 20px; max-width: 800px; margin: auto; line-height: 1.5; }
    h2 { color: #d35400; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 40px; }
    fieldset { border: 1px solid #ccc; border-radius: 5px; padding: 20px; margin-bottom: 20px; background: #fff; }
    legend { font-weight: bold; background: #d35400; color: white; padding: 4px 8px; border-radius: 4px; }
    .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
    label { font-weight: 600; margin-bottom: 5px; }
    input, select, textarea { padding: 8px; border: 1px solid #aaa; border-radius: 4px; font-size: 1rem; }
    input[type="checkbox"], input[type="radio"] { width: auto; margin-right: 8px; }
    .inline-group { display: flex; align-items: center; margin-bottom: 10px; }
    button { padding: 10px 15px; background: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #1a5276; }
    details { background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 4px; margin-bottom: 20px; }
    summary { font-weight: bold; cursor: pointer; }
    dialog { border: none; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); padding: 20px; }
    dialog::backdrop { background: rgba(0,0,0,0.5); }
  </style>
</head>

<body>

  <!-- ===================================================== -->
  <!-- ================== FORM SECTION ===================== -->
  <!-- ===================================================== -->

  <!-- 
  <form>

  Explanation:
  Container for user input controls.

  Critical Attributes:
  - action → URL where form data is sent.
  - method → GET or POST.
        GET  → data appended to URL.
        POST → data sent in request body.
  - target → _self, _blank, etc.
    *
    *
  - autocomplete → on / off
  - enctype → encoding type
        application/x-www-form-urlencoded (default)
        multipart/form-data (required for file uploads)
        text/plain

  Use Case:
  Required when collecting user input.
  -->
  <form action="/example-api" method="POST">

    <!-- 
    <fieldset>

    Explanation:
    Groups related form controls.

    Use Case:
    Improves accessibility & organization.
    -->
    <fieldset>

      <!-- 
      <legend>

      Explanation:
      Title for fieldset group.
      -->
      <legend>User Account Details</legend>

      <!-- 
      <label>

      Explanation:
      Describes input field.

      Key Attribute:
      - for → must match input id.

      Why Important?
      Improves accessibility & clickable area.
      -->
      <label for="username-input">Username</label>

      <!-- 
      <input>

      Explanation:
      Self-closing tag for user input.

      Core Attributes:
      - type → defines behavior
      - name → key sent to backend (REQUIRED for submission)
      - id → connects to label
      - placeholder → hint text
      - required → prevents empty submission
      - value → default value
      - readonly → cannot edit
      - disabled → excluded from submission
      - maxlength → character limit
      - pattern → regex validation
      - autocomplete → on/off

      Common Types:
      text, email, password, number,
      checkbox, radio, file,
      date, time, datetime-local,
      color, range, hidden, submit

      -->
      <input type="text" id="username-input" name="username" placeholder="e.g. CodeMaster99" required><br>
      
      <!-- Email Input -->
      <label for="email-input">Email Address</label>
      <input type="email" id="email-input" name="email" required><br>

      <!-- Password Input -->
      <label for="password-input">Password</label>
      <input type="password" id="password-input" name="password" required><br>

      <!-- Number Input -->
      <!-- Additional Attributes:
           min, max, step
      -->
      <label for="age-input">Age</label>
      <input type="number" id="age-input" name="age" min="18" max="100"><br>

      <!-- Date Input -->
      <!-- Accepts date in YYYY-MM-DD format -->
      <label for="dob-input">Date of Birth</label>
      <input type="date" id="dob-input" name="dob"><br>

      <!-- Checkbox -->
      <!-- Multiple checkboxes can share same name -->
      <input type="checkbox" id="terms" name="terms" value="accepted" required>
      <label for="terms">I accept the terms and conditions</label><br>

      <!-- Radio Buttons -->
      <!-- 
      Radio inputs MUST share same name to work as group.
      Only one can be selected.
      -->
      <input type="radio" id="theme-light" name="theme" value="light" checked>
      <label for="theme-light">Light</label>

      <input type="radio" id="theme-dark" name="theme" value="dark">
      <label for="theme-dark">Dark</label>

    </fieldset>

    <fieldset>
      <legend>Additional Info</legend>

      <!-- 
      <textarea>

      Explanation:
      Multi-line text input.

      Important Attributes:
      - rows
      - cols
      - maxlength
      - placeholder
      - required
      - name (critical for submission)
      -->
      <label for="bio-input">Biography</label>
      <textarea id="bio-input" name="bio" rows="4" placeholder="Tell us about yourself..."></textarea><br>

      <!-- 
      <select>

      Explanation:
      Dropdown list.

      Important Attributes:
      - name
      - multiple (allows multi-select)
      - size (visible options count)
      - required
      -->
      <label for="country-select">Country</label>
      <select id="country-select" name="country">
        <option value="">-- Choose a Country --</option>
        <option value="us">United States</option>
        <option value="ca">Canada</option>
        <option value="jo" selected>Jordan</option>
      </select><br>

      <!-- 
      <datalist>

      Explanation:
      Provides autocomplete suggestions.

      Connected via:
      input list="datalist-id"

      Important:
      Unlike select, user can enter custom values.
      -->
      <label for="browser-input">Favorite Browser</label>
      <input type="text" id="browser-input" name="browser" list="browser-list" placeholder="Start typing...">
      <datalist id="browser-list">
        <option value="Chrome">
        <option value="Firefox">
        <option value="Safari">
        <option value="Edge">
      </datalist>

      <!-- 
      File Input
      Explanation:
      Allows users to upload files.
      Important Attributes:
      - accept → restrict file types (e.g. image/*, .pdf)
      - multiple → allow multiple file selection
      - name → critical for backend processing
      - required → forces file selection before submission
      -->
      <label for="file">Upload Profile Picture</label>
      <input type="file" name="file" id="file" accept="image/*">

    </fieldset>

    <!-- 
    <button>

    Explanation:
    Clickable button element.

    Types:
    - submit (default inside form)
    - reset
    - button (manual JS use)

    Prefer <button> over input type="submit" for flexibility.
    -->
    <button type="submit">Register Account</button>

  </form>

  <!-- ===================================================== -->
  <!-- ============ NATIVE INTERACTIVE WIDGETS ============ -->
  <!-- ===================================================== -->

  <!-- 
  <details> & <summary>

  Explanation:
  Built-in accordion behavior.

  No JavaScript required.
  -->
  <details>
    <summary>FAQ: Do I need JavaScript for this accordion?</summary>
    <p>Nope! The details and summary tags handle this natively.</p>
  </details>

  <!-- 
  <progress>

  Explanation:
  Represents task progress.

  Attributes:
  - value → current progress
  - max → maximum value
  -->
  <progress value="70" max="100">70%</progress>

  <!-- 
  <meter>

  Explanation:
  Represents scalar measurement (like score, disk usage).

  Attributes:
  - min
  - max
  - low
  - high
  - optimum
  - value
  -->
  <meter min="0" max="100" low="33" high="66" optimum="80" value="85">85%</meter>

  <!-- 
  <dialog>

  Explanation:
  Native modal dialog.

  Methods:
  - show()
  - showModal()
  - close()

  Attribute:
  - open (boolean)

  form method="dialog":
  Allows button to close modal automatically.
  -->
  <button onclick="document.getElementById('my-modal').showModal()">Open Native Modal</button>

  <dialog id="my-modal">
    <h3>Native HTML Modal</h3>
    <p>This modal dims background using ::backdrop.</p>
    <form method="dialog">
      <button type="submit">Close</button>
    </form>
  </dialog>

</body>
</html>
