<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 2</title>
    <link rel="stylesheet" href="style2.1.css">
</head>

<body>
    <header>
        <img src="link.png" alt="linkedin logo" width="80px">
    </header>
    <section>
        <div id="form">
            <h1>Sign in</h1>
            <p>Stay updated on your profissional world</p>
            <div id="inputs">
                <input type="email" name="email" id="email" placeholder="Email"><br>
                <input type="password" name="pass" id="pass" placeholder="Password">
            </div>
            <h5 id="forgot">Forgot password?</h5>

            <div id="buttons-section">
                <button class="buttons" id="signIn_button">Sign in</button>
                <h6>or</h6>
                <button class="buttons" id="signIn-apple">Sign in with Apple</button>
            </div>
        </div>
    </section>

    <p>New to LinkedIn? <span>Join now</span></p>

    <footer>
        <div id="container">
            <a><strong>LinkedIn C 2021</strong></a>
            <a>User Agreement</a>
            <a>Privacy Policy</a>
            <a>Community Guidelines</a>
            <a>Cookie Policy</a>
            <a>Copyright Policy</a>
            <a>Send Feedback</a>
            <a>Language</a>
        </div>
    </footer>
</body>

</html>
