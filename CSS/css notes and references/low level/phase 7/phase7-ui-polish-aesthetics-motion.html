<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Phase 7 — UI Polish, Aesthetics & Motion</title>

<link rel="stylesheet" href="phase7-ui-polish-aesthetics-motion.css">

</head>

<body>

<header class="page-header">

<!-- 
  PAGE HEADER
  Purpose: Introduces UI styling and motion effects
-->
<h1>CSS Phase 7: UI Polish, Aesthetics & Motion</h1>

<p class="subtitle">
Adding depth, rounded corners, filters, and animation to interfaces.
</p>

</header>



<section class="section">

<h2>Border Radius</h2>

<!-- 
  ROUNDED CARD
  Purpose: Demonstrates border-radius values
-->
<div class="card-rounded">
Rounded corner card
</div>

<!-- 
  CIRCLE
  Purpose: Demonstrates 50% radius creating circle
-->
<div class="circle">
Circle
</div>

</section>



<section class="section">

<h2>Box Shadow</h2>

<!-- 
  SHADOW CARD
  Purpose: Demonstrates depth using box-shadow
-->
<div class="shadow-card">
Card with shadow
</div>

</section>



<section class="section">

<h2>Filters</h2>

<!-- 
  FILTER DEMO
  Purpose: Demonstrates graphical filter effects
-->
<div class="filter-container">

<img src="https://picsum.photos/300/200" class="blur-img" alt="blur demo">

<img src="https://picsum.photos/301/200" class="bright-img" alt="brightness demo">

</div>

</section>



<section class="section">

<h2>Transforms</h2>

<!-- 
  TRANSFORM CARD
  Purpose: Demonstrates translate, scale, rotate
-->
<div class="transform-card">
Hover me
</div>

</section>



<section class="section">

<h2>Transitions</h2>

<!-- 
  TRANSITION BUTTON
  Purpose: Smooth hover animations
-->
<button class="transition-btn">
Hover Animation
</button>

</section>



<section class="section">

<h2>Keyframe Animation</h2>

<!-- 
  ANIMATED BOX
  Purpose: Demonstrates CSS animation
-->
<div class="animation-box"></div>

</section>



<footer class="footer">

<p>End of Phase 7 Reference</p>

</footer>

</body>
</html>
